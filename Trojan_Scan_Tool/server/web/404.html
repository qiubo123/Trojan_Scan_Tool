<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - 页面不存在</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        background: #0a0e1a;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .error-box {
        text-align: center;
        padding: 60px;
    }
    .error-box .code {
        font-size: 120px;
        font-weight: bold;
        color: #e94560;
        text-shadow: 0 0 40px rgba(233,69,96,0.3);
        line-height: 1;
    }
    .error-box .message {
        font-size: 20px;
        color: #888;
        margin-top: 20px;
    }
    .error-box .desc {
        font-size: 14px;
        color: #666;
        margin-top: 12px;
    }
    .error-box .btn {
        display: inline-block;
        margin-top: 30px;
        padding: 12px 32px;
        background: #e94560;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
    }
    .error-box .btn:hover {
        background: #d63851;
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(233,69,96,0.3);
    }
</style>
</head>
<body>
<div class="error-box">
    <div class="code">404</div>
    <div class="message">页面不存在</div>
    <div class="desc">您访问的页面不存在或已被移除</div>
    <a class="btn" href="/web/login.html">返回首页</a>
</div>
</body>
</html>
